<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpendWise — AI SaaS Savings Audit Optimizer</title>
    <style>
      #bubble-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        pointer-events: none;
        opacity: 0.14;
      }
      #root {
        position: relative;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <!-- Glassmorphic floating bubble background particles -->
    <canvas id="bubble-canvas"></canvas>
    <script>
      (function() {
        const canvas = document.getElementById('bubble-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let bubbles = [];
        
        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
        
        class Bubble {
          constructor() {
            this.reset(true);
          }
          reset(init = false) {
            this.x = Math.random() * canvas.width;
            this.y = init ? Math.random() * canvas.height : canvas.height + 100;
            this.radius = Math.random() * 25 + 5;
            this.speed = Math.random() * 0.7 + 0.15;
            this.drift = Math.random() * 0.3 - 0.15;
            this.opacity = Math.random() * 0.35 + 0.05;
            // Teal color spectrum matching Credits / SpendWise brand
            this.r = 45;
            this.g = Math.random() > 0.5 ? 212 : 180;
            this.b = Math.random() > 0.5 ? 191 : 230;
          }
          update() {
            this.y -= this.speed;
            this.x += this.drift;
            if (this.y < -100) {
              this.reset(false);
            }
          }
          draw() {
            ctx.beginPath();
            const grad = ctx.createRadialGradient(
              this.x - this.radius * 0.25,
              this.y - this.radius * 0.25,
              this.radius * 0.1,
              this.x,
              this.y,
              this.radius
            );
            grad.addColorStop(0, `rgba(255, 255, 255, ${this.opacity * 1.5})`);
            grad.addColorStop(0.3, `rgba(${this.r}, ${this.g}, ${this.b}, ${this.opacity})`);
            grad.addColorStop(1, `rgba(${this.r - 20}, ${this.g - 50}, ${this.b - 50}, 0)`);
            
            ctx.fillStyle = grad;
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.strokeStyle = `rgba(45, 212, 191, ${this.opacity * 0.25})`;
            ctx.lineWidth = 0.5;
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.stroke();
          }
        }
        
        const bubbleCount = Math.min(Math.floor(window.innerWidth / 25), 40);
        for (let i = 0; i < bubbleCount; i++) {
          bubbles.push(new Bubble());
        }
        
        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          bubbles.forEach(b => {
            b.update();
            b.draw();
          });
          requestAnimationFrame(animate);
        }
        animate();
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
